spring.application.name=librarynet-backend
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/librarynet}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=${SHOW_SQL:false}

spring.jackson.serialization.write-dates-as-timestamps=false
spring.web.error.include-message=always
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

librarynet.frontend-origin=${FRONTEND_ORIGIN:http://localhost:5173}
librarynet.seed-sample-data=${SEED_SAMPLE_DATA:true}
