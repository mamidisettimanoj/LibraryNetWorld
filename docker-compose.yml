services:
  postgres:
    image: postgres:17-alpine
    container_name: librarynet-postgres
    environment:
      POSTGRES_DB: librarynet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - librarynet_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d librarynet"]
      interval: 5s
      timeout: 5s
      retries: 12

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: librarynet-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@librarynet.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  librarynet_pgdata:
