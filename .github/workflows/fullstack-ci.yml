name: LibraryNet Full-Stack CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Select Maven command
        run: |
          if [ -f ./mvnw ]; then
            chmod +x ./mvnw
            echo "MAVEN_COMMAND=./mvnw" >> "$GITHUB_ENV"
          else
            echo "MAVEN_COMMAND=mvn" >> "$GITHUB_ENV"
          fi

      - name: Verify Maven
        run: $MAVEN_COMMAND --version

      - name: Build & Test Spring Boot Backend
        run: $MAVEN_COMMAND -B clean test

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm install --no-audit --no-fund

      - name: Run ESLint
        run: npm run lint

      - name: Build React Frontend
        run: npm run build
